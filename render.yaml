services:
  - type: web
    name: talentai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
